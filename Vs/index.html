<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Portal</title>
    <style>
        /* RESET & BACKGROUND */
        body { 
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Update background image URL here */
            background: url('/Vs/bg/bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* RESPONSIVE CONTAINER */
        .card {
            background: rgba(255, 255, 255, 0.95);
            width: 90%; /* Mobile width */
            max-width: 450px; /* Laptop maximum width */
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            margin: 20px 0;
        }

        /* HEADER IMAGE */
        .banner {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        /* FORM STYLING */
        form {
            padding: 30px;
        }

        h2 {
            margin: 0 0 20px 0;
            text-align: center;
            color: #333;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #666;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px; /* Prevents auto-zoom on iOS */
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: #007bff;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s, transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #888;
        }

        /* MOBILE SPECIFIC ADJUSTMENTS */
        @media (max-width: 480px) {
            .card { width: 95%; }
            .banner { height: 140px; }
            form { padding: 20px; }
            h2 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Top Image -->
    <img src="/Vs/bg/VS_Logo.png" alt="Banner" class="banner">

    <form id="customerForm">
        <h2>Customer Order</h2>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter name" required>
        </div>

        <div class="input-group">
            <label>Contact Number</label>
            <input type="tel" id="contact" placeholder="00000 00000" required>
        </div>

        <div class="input-group">
            <label>Payment Method</label>
            <select id="payment">
                <option value="Cash">Cash</option>
                <option value="Online">Online</option>
            </select>
        </div>

        <div class="input-group">
            <label>Price Selection</label>
            <select id="price">
                <option value="60">₹60.00</option>
                <option value="80">₹80.00</option>
            </select>
        </div>

        <button type="submit" id="submitBtn">Save Details</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbw-XKE78ut2Ev6y1iVpif3M4Ii7G4c8dvIk7ltK7e5BWEYvZDOEnNZM3Wd8LoC7yu2n/exec';
    const form = document.getElementById('customerForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Saving Data...";

        const data = {
            name: document.getElementById('name').value,
            contact: document.getElementById('contact').value,
            payment: document.getElementById('payment').value,
            price: document.getElementById('price').value
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        })
        .then(() => {
            alert("Entry Saved Successfully!");
            form.reset();
            btn.disabled = false;
            btn.innerText = "Save Details";
        })
        .catch(error => {
            alert("Error saving data!");
            console.error(error);
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
